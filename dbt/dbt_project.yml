config-version: 2

name: "jaffle_shop"
version: "3.0.0"
require-dbt-version: ">=1.5.0"

dbt-cloud:
  project-id: 275557 # Put your project id here

profile: jaffle_shop # Put your profile here

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["data-tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  "dbt_date:time_zone": "America/Los_Angeles"

seeds:
  jaffle_shop:
    +schema: raw
    +table_type: iceberg # ignored by the duckdb adapter; used by the athena/prod target
    jaffle-data:
      +enabled: "{{ var('load_source_data', false) }}"
      # Explicit types since the checked-in seed CSVs are headers only (no
      # data rows) -- DuckDB's CSV type sniffer can't reliably infer column
      # types (e.g. timestamps) from an empty sample.
      raw_customers:
        +column_types:
          id: varchar
          name: varchar
      raw_orders:
        +column_types:
          id: varchar
          customer: varchar
          ordered_at: timestamp
          store_id: varchar
          subtotal: bigint
          tax_paid: bigint
          order_total: bigint
      raw_items:
        +column_types:
          id: varchar
          order_id: varchar
          sku: varchar
      raw_products:
        +column_types:
          sku: varchar
          name: varchar
          type: varchar
          price: bigint
          description: varchar
      raw_stores:
        +column_types:
          id: varchar
          name: varchar
          opened_at: timestamp
          tax_rate: double
      raw_supplies:
        +column_types:
          id: varchar
          name: varchar
          cost: bigint
          perishable: boolean
          sku: varchar
      raw_tweets:
        +column_types:
          id: varchar
          user_id: varchar
          tweeted_at: timestamp
          content: varchar

models:
  jaffle_shop:
    +table_type: iceberg # ignored by the duckdb adapter; used by the athena/prod target
    staging:
      +materialized: view
    marts:
      +materialized: table
