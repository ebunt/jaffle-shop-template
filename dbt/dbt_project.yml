config-version: 2

name: "jaffle_shop"
version: "3.0.0"
# >=1.10.5: generic test configs use the nested `arguments:` property
# (models/marts/*.yml, models/staging/*.yml), which older dbt versions
# don't parse -- see MissingArgumentsPropertyInGenericTestDeprecation.
require-dbt-version: ">=1.10.5"

dbt-cloud:
  project-id: 275557 # Put your project id here

profile: jaffle_shop # Put your profile here

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["data-tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  "dbt_date:time_zone": "America/Los_Angeles"

# dbt-athena's adapter.type() is "athena", so dbt_date's internal dispatch
# only tries athena__* then default__* macros within the dbt_date package --
# it has no athena__convert_timezone, so it falls through to
# default__convert_timezone, which emits a raw `convert_timezone(...)` SQL
# call Trino doesn't have. dbt_date does ship a working trino__convert_timezone,
# so this tells dispatch to check our own project's macros (which provide an
# athena__convert_timezone shim -- see macros/athena_dispatch.sql) before
# falling back to dbt_date's own resolution.
dispatch:
  - macro_namespace: dbt_date
    search_order: ["jaffle_shop", "dbt_date"]

seeds:
  jaffle_shop:
    +schema: raw
    +table_type: iceberg # ignored by the duckdb adapter; used by the athena/prod target
    jaffle-data:
      +enabled: "{{ var('load_source_data', false) }}"
      # Explicit types since the checked-in seed CSVs are headers only (no
      # data rows) -- DuckDB's CSV type sniffer can't reliably infer column
      # types (e.g. timestamps) from an empty sample.
      raw_customers:
        +column_types:
          id: varchar
          name: varchar
      raw_orders:
        +column_types:
          id: varchar
          customer: varchar
          ordered_at: timestamp
          store_id: varchar
          subtotal: bigint
          tax_paid: bigint
          order_total: bigint
      raw_items:
        +column_types:
          id: varchar
          order_id: varchar
          sku: varchar
      raw_products:
        +column_types:
          sku: varchar
          name: varchar
          type: varchar
          price: bigint
          description: varchar
      raw_stores:
        +column_types:
          id: varchar
          name: varchar
          opened_at: timestamp
          tax_rate: double
      raw_supplies:
        +column_types:
          id: varchar
          name: varchar
          cost: bigint
          perishable: boolean
          sku: varchar
      raw_tweets:
        +column_types:
          id: varchar
          user_id: varchar
          tweeted_at: timestamp
          content: varchar

models:
  jaffle_shop:
    +table_type: iceberg # ignored by the duckdb adapter; used by the athena/prod target
    # Other athena/Iceberg model config -- uncomment what you want (all
    # ignored by the duckdb adapter, only apply to the athena/prod target):
    +native_drop: true # skip dbt's manual S3 delete on drop/full-refresh; let Iceberg's own DROP TABLE clean up instead (generally the right call for Iceberg tables)
    # +format: parquet # file format; parquet is already the default if unset
    # +write_compression: zstd # compression codec, e.g. snappy (default), zstd, gzip
    # +partitioned_by: ["ordered_at"] # columns to partition on -- pick columns commonly filtered on
    # +table_properties: # arbitrary Iceberg table properties (tblproperties)
    #   vacuum_max_snapshot_age_seconds: "604800"
    # +external_location: "s3://bucket/custom/path/" # override the computed S3 path for this model
    staging:
      +materialized: view
    marts:
      +materialized: table
