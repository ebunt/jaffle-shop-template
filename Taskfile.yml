version: "3"

silent: true

vars:
  YEARS: 6

tasks:
  venv:
    cmds:
      - uv venv

  install:
    cmds:
      - uv pip install -q -r requirements.txt

  gen:
    cmds:
      - cd dbt && uv run jafgen {{.YEARS}} && rm -rf seeds/jaffle-data && mv jaffle-data seeds

  deps:
    cmds:
      - uv run dbt deps --project-dir dbt --profiles-dir dbt

  seed:
    cmds:
      - task: deps
      - >
        uv run dbt seed --project-dir dbt --profiles-dir dbt --full-refresh --vars '{"load_source_data": true}' {{.CLI_ARGS}}

  # Staging models reference the jaffle-data seeds via source(), not ref(),
  # so dbt has no DAG edge between them -- the seed must load in its own
  # invocation before run/test/build, or the "raw" schema won't exist yet.
  _ensure-seeded:
    internal: true
    cmds:
      - task: deps
      - >
        uv run dbt seed --project-dir dbt --profiles-dir dbt --full-refresh --vars '{"load_source_data": true}'

  run:
    cmds:
      - task: _ensure-seeded
      - uv run dbt run --project-dir dbt --profiles-dir dbt {{.CLI_ARGS}}

  test:
    cmds:
      - task: _ensure-seeded
      - uv run dbt test --project-dir dbt --profiles-dir dbt {{.CLI_ARGS}}

  build:
    cmds:
      - task: _ensure-seeded
      - uv run dbt build --project-dir dbt --profiles-dir dbt {{.CLI_ARGS}}

  clean:
    cmds:
      - rm -rf dbt/jaffle-data
      - uv run dbt clean --project-dir dbt --profiles-dir dbt
      - rm -f jaffle_shop.duckdb

  load:
    cmds:
      - task: venv
      - task: install
      - task: gen
      - task: seed
      - task: clean
