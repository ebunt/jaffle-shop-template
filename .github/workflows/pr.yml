name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint & unit test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run ty check .
      - run: uv run pytest -q

  dbt-slim-ci:
    name: dbt build (state:modified+)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run dbt deps --project-dir dbt --profiles-dir dbt

      # Restores the most recent state saved by main.yml: a prior build's
      # manifest.json (for `state:modified` comparison) plus its DuckDB file
      # (so deferred/unselected nodes can be read without rebuilding them).
      - name: Restore prod dbt state
        id: restore-state
        uses: actions/cache/restore@v4
        with:
          path: ci-state
          key: dbt-state-pr-${{ github.sha }}
          restore-keys: |
            dbt-state-main-

      # Seeding is a separate, one-time invocation: the staging models
      # reference the seeded tables via source(), not ref(), so dbt has no
      # DAG edge between the seed and the models that depend on it — running
      # them in the same `dbt build` leaves their relative order undefined.
      - name: Full build (no prior state to diff against)
        if: steps.restore-state.outputs.cache-matched-key == ''
        run: |
          uv run dbt seed --project-dir dbt --profiles-dir dbt --vars '{"load_source_data": true}'
          uv run dbt build --project-dir dbt --profiles-dir dbt

      # The restored DuckDB file already has data seeded from main's build,
      # so this only needs to (re)build the nodes state:modified+ selects.
      - name: Slim build (only modified nodes + downstream)
        if: steps.restore-state.outputs.cache-matched-key != ''
        run: |
          cp ci-state/jaffle_shop.duckdb jaffle_shop.duckdb
          uv run dbt build --project-dir dbt --profiles-dir dbt \
            --select "state:modified+" --defer --favor-state \
            --state "$GITHUB_WORKSPACE/ci-state"
